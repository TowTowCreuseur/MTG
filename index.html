<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deck Builder — MTG</title>
    <link rel="stylesheet" href="styles-deck.css" />
    <script type="module" src="app-deck.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Deck Builder — MTG</h1>
      <p class="subtitle">Rechercher des cartes et les ajouter au deck</p>
    </header>

    <main class="builder">
      <!-- Colonne gauche : recherche + résultats -->
      <section class="search-panel">
        <div class="searchbar">
          <span class="icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"/>
              <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <input id="q" type="text" placeholder="Nom de la carte…" aria-label="Rechercher une carte" />
        </div>

        <!-- Résultats (2 colonnes) -->
        <div class="results" aria-live="polite" aria-label="Résultats de recherche"></div>

        <!-- Pagination tout en bas -->
        <div id="pager" class="pager" aria-label="Pagination"></div>
      </section>

      <!-- Colonne droite : deck courant -->
      <aside class="deck-panel" aria-label="Deck en construction">
        <div class="deck-header">
          <h2>Deck</h2>
          <div class="deck-stats"><span id="deck-count">0</span> cartes</div>
        </div>

        <!-- Commander -->
        <section class="commander-box" aria-label="Commander">
          <div class="commander-title">Commander</div>
          <div id="commander-slot" class="commander-slot empty">Aucun commander</div>
        </section>

        <div class="deck-list" id="deck-list"></div>

        <div class="deck-actions">
          <button class="btn-secondary" id="btn-clear">Vider</button>
          <!-- ✅ Réinitialisation du terrain sauvegardé -->
          <button class="btn-secondary" id="btn-reset-board" title="Effacer la sauvegarde de la partie précédente (plateau, zones, etc.)">
            Réinitialiser le terrain
          </button>
          <button class="btn-secondary" id="btn-import">Importer (JSON)</button>
          <button class="btn-secondary" id="btn-decklist">Entrer decklist</button>
          <input type="file" id="file-input" accept="application/json" hidden>
          <button class="btn-primary" id="btn-export">Exporter (JSON)</button>
          <!-- Le champ "Pseudo" sera injecté ici juste au-dessus par app-deck.js -->
          <button class="btn-primary" id="btn-go-play">Rejoindre la partie</button>
        </div>
      </aside>
    </main>

    <!-- ✅ Modale : Exporter le deck -->
    <dialog id="exportDialog" class="modal" aria-label="Exporter le deck">
      <form method="dialog" class="modal-body" onsubmit="return false;">
        <header class="modal-header">
          <h2>Exporter le deck</h2>
        </header>
        <label for="exportName">Nom du fichier</label>
        <input id="exportName" type="text" placeholder="deck-AAAAMMJJ-HHMM">
        <div id="exportError" class="modal-error"></div>
        <footer class="modal-footer">
          <button type="button" class="btn-secondary" id="exportCancelBtn">Annuler</button>
          <button type="button" class="btn-primary" id="exportConfirmBtn">Exporter</button>
        </footer>
      </form>
    </dialog>
  
    <!-- Dialog : saisie decklist MTGO -->
    <dialog id="dlg-decklist" class="modal" aria-label="Entrer une decklist">
      <form method="dialog" class="modal-body">
        <header class="modal-header"><h2>Entrer une decklist (format MTGO)</h2></header>
        <textarea id="decklist-input" rows="22" style="width:100%;box-sizing:border-box;background:#0e1522;color:#e6e9ee;border:1px solid #22314a;border-radius:8px;padding:10px;font-family:monospace;font-size:13px;resize:vertical;" placeholder="1 Abrade&#10;4 Mountain&#10;...&#10;&#10;SIDEBOARD:&#10;1 Rowan, Scion of War"></textarea>
        <footer class="modal-footer">
          <button type="button" class="btn-secondary" id="btn-decklist-cancel">Annuler</button>
          <button type="button" class="btn-primary" id="btn-decklist-generate">Générer le deck</button>
        </footer>
      </form>
    </dialog>

    <!-- Dialog : saisie nom du deck -->
    <dialog id="dlg-deckname" class="modal" aria-label="Nom du deck">
      <form method="dialog" class="modal-body">
        <header class="modal-header"><h2>Nom du deck</h2></header>
        <input id="deck-name-input" type="text" placeholder="Mon deck" />
        <footer class="modal-footer">
          <button type="button" class="btn-secondary" id="btn-deckname-cancel">Annuler</button>
          <button type="button" class="btn-primary" id="btn-deckname-download">Télécharger</button>
        </footer>
      </form>
    </dialog>

    <!-- Overlay enrichissement -->
    <div id="enrich-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;">
      <div style="color:#fff;font-size:1.2rem;font-weight:600;">Enrichissement en cours…</div>
      <div id="enrich-progress" style="color:#9aa3b2;font-size:.95rem;"></div>
    </div>

</body>
</html>
