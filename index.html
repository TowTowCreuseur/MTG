<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plateau MTG — Prototype</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>Plateau MTG — Prototype</h1>
        </div>
        <!-- 🔥 Nouveau : retour au deck builder -->
        <a class="btn-nav" href="deck-builder.html" title="Retour au Deck Builder">↩︎ Deck Builder</a>
      </div>
    </header>

    <main class="board" aria-label="Plateau de jeu MTG">
      <div class="board-layout">
        <!-- Colonne gauche -->
        <aside class="side-zones">

          <!-- 🆕 POINTS DE VIE -->
          <div class="zone zone--life" data-zone="life" aria-label="Points de vie">
            <div class="zone-title">Points de vie</div>
            <div class="life-wrap">
              <button type="button" class="btn-life btn-life-minus" title="Retirer 1 point" aria-label="Retirer 1 point">−</button>
              <button type="button" class="life-value" title="Cliquer pour définir la valeur" aria-live="polite">40</button>
              <button type="button" class="btn-life btn-life-plus" title="Ajouter 1 point" aria-label="Ajouter 1 point">+</button>
            </div>
          </div>

          <!-- PIOCHE -->
          <div class="zone zone--pioche" data-zone="pioche" aria-label="Pioche (bibliothèque)">
            <div class="zone-title">Pioche</div>
            <div class="pioche-controls">
              <button class="btn-draw" title="Cliquer pour prendre la carte du dessus">Piocher</button>
              <button class="btn-search" title="Chercher dans la bibliothèque" aria-label="Chercher dans la pioche">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"></circle>
                  <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
                </svg>
              </button>
            </div>
            <div class="cards cards--pioche" aria-live="polite"></div>
            <div class="deck-count" aria-live="polite"><span data-count>0</span> cartes</div>
          </div>

          <!-- COMMANDER -->
          <div class="zone zone--commander dropzone" data-zone="commander" aria-label="Zone de commandement">
            <div class="zone-title">Commander</div>
            <div class="cards"></div>
          </div>

          <!-- CIMETIÈRE -->
          <div class="zone zone--cimetiere dropzone" data-zone="cimetiere" aria-label="Cimetière">
            <div class="zone-title">
              Cimetière
              <button class="btn-search btn-search-graveyard" title="Chercher dans le cimetière" aria-label="Chercher dans le cimetière">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"></circle>
                  <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
                </svg>
              </button>
            </div>
            <div class="cards"></div>
          </div>

          <!-- EXIL -->
          <div class="zone zone--exil dropzone" data-zone="exil" aria-label="Exil">
            <div class="zone-title">
              Exil
              <button class="btn-search btn-search-exile" title="Chercher dans l’exil" aria-label="Chercher dans l’exil">
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"></circle>
                  <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"></line>
                </svg>
              </button>
            </div>
            <div class="cards"></div>
          </div>
        </aside>

        <!-- Champ de bataille -->
        <section class="zone zone--bataille" data-zone="bataille" aria-label="Champ de bataille">
          <div class="zone-title">Champ de bataille</div>
          <div class="battle-rows">
            <div class="battle-row dropzone" data-subrow="1">
              <div class="cards cards--battlefield"></div>
            </div>
            <div class="battle-row dropzone" data-subrow="2">
              <div class="cards cards--battlefield"></div>
            </div>
            <div class="battle-row dropzone" data-subrow="3">
              <div class="cards cards--battlefield"></div>
            </div>
          </div>
        </section>
      </div>

      <!-- Main du joueur -->
      <section class="zone zone--main dropzone" data-zone="main" aria-label="Main du joueur">
        <div class="zone-title">Main</div>
        <div class="cards cards--hand"></div>
      </section>
    </main>

    <!-- Modale de recherche -->
    <dialog class="modal modal-search" aria-label="Chercher dans la bibliothèque">
      <form method="dialog" class="modal-body" id="search-form" onsubmit="this.closest('dialog').close()">
        <header class="modal-header">
          <h2 class="search-title">Recherche dans la bibliothèque</h2>
          <input type="text" class="search-input" placeholder="Nom, type..." aria-label="Filtrer les cartes" />
        </header>
        <div class="search-results" aria-live="polite"></div>
        <footer class="modal-footer">
          <button value="close" class="btn-secondary">Fermer</button>
          <button type="button" class="btn-secondary btn-shuffle">Mélanger</button>
        </footer>
      </form>
    </dialog>
  </body>
</html>
