<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deck Builder — MTG</title>
    <link rel="stylesheet" href="styles-deck.css" />
    <script type="module" src="app-deck.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Deck Builder — MTG</h1>
      <p class="subtitle">Rechercher des cartes et les ajouter au deck</p>
    </header>

    <main class="builder">
      <!-- Colonne gauche : recherche + résultats -->
      <section class="search-panel">
        <div class="searchbar">
          <span class="icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" stroke="currentColor" fill="none" stroke-width="2"/>
              <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
        <input id="q" type="text" placeholder="Nom de la carte…" aria-label="Rechercher une carte" />
        </div>

        <!-- Résultats (2 colonnes) -->
        <div class="results" aria-live="polite" aria-label="Résultats de recherche"></div>

        <!-- Pagination tout en bas -->
        <div id="pager" class="pager" aria-label="Pagination"></div>
      </section>

      <!-- Colonne droite : deck courant -->
      <aside class="deck-panel" aria-label="Deck en construction">
        <div class="deck-header">
          <h2>Deck</h2>
          <div class="deck-stats"><span id="deck-count">0</span> cartes</div>
        </div>

        <!-- Commander -->
        <section class="commander-box" aria-label="Commander">
          <div class="commander-title">Commander</div>
          <div id="commander-slot" class="commander-slot empty">Aucun commander</div>
        </section>

        <div class="deck-list" id="deck-list"></div>

        <div class="deck-actions">
          <button class="btn-secondary" id="btn-clear">Vider</button>
          <button class="btn-secondary" id="btn-import">Importer (JSON)</button>
          <input type="file" id="file-input" accept="application/json" hidden>
          <button class="btn-primary" id="btn-export">Exporter (JSON)</button>
          <!-- 🔥 Sessions : on remplace l'ancien bouton d'ouverture -->
          <button class="btn-primary" id="btn-go-play">Rejoindre la partie</button>
        </div>
      </aside>
    </main>

    <!-- 🔥 Modale : Rejoindre une session -->
    <dialog id="joinDialog" class="modal" aria-label="Rejoindre une session">
      <form method="dialog" class="modal-body">
        <header class="modal-header">
          <h2>Rejoindre une session</h2>
        </header>
        <label>Pseudo</label>
        <input type="text" id="joinPseudo" placeholder="Entrez votre pseudo">
        <label>Entrer le numéro de session</label>
        <input type="text" id="joinSessionId" placeholder="ex: abc123">
        <div id="joinError" class="modal-error"></div>
        <footer class="modal-footer">
          <button value="close" class="btn-secondary">Annuler</button>
          <button type="button" class="btn-primary" id="joinConfirmBtn">Rejoindre</button>
        </footer>
      </form>
    </dialog>

    <!-- 🔥 Modale : Créer une session -->
    <dialog id="createDialog" class="modal" aria-label="Créer une session">
      <form method="dialog" class="modal-body">
        <header class="modal-header">
          <h2>Créer une session</h2>
        </header>
        <label>Pseudo</label>
        <input type="text" id="createPseudo" placeholder="Entrez votre pseudo">
        <p style="margin:12px 0 6px;">Partagez ensuite ce lien aux autres joueurs :</p>
        <div class="inline-group">
          <input type="text" id="inviteLink" readonly>
          <button type="button" class="btn-secondary" id="copyInviteBtn">Copier</button>
        </div>
        <div id="createError" class="modal-error"></div>
        <footer class="modal-footer">
          <button value="close" class="btn-secondary">Fermer</button>
          <button type="button" class="btn-primary" id="startGameBtn">Commencer la partie</button>
        </footer>
      </form>
    </dialog>

    <!-- ✅ Nouvelle modale : Exporter le deck -->
    <dialog id="exportDialog" class="modal" aria-label="Exporter le deck">
      <form method="dialog" class="modal-body" onsubmit="return false;">
        <header class="modal-header">
          <h2>Exporter le deck</h2>
        </header>
        <label for="exportName">Nom du fichier</label>
        <input id="exportName" type="text" placeholder="deck-AAAAMMJJ-HHMM">
        <div id="exportError" class="modal-error"></div>
        <footer class="modal-footer">
          <button type="button" class="btn-secondary" id="exportCancelBtn">Annuler</button>
          <button type="button" class="btn-primary" id="exportConfirmBtn">Exporter</button>
        </footer>
      </form>
    </dialog>
  </body>
</html>
